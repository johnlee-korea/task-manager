<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - 업무 일정 관리</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <!-- ==================== 헤더 영역 ==================== -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">📋 Task Manager</h1>
      <span class="header-date" id="todayDate"></span>
    </div>
    <div class="header-center">
      <nav class="view-tabs">
        <button class="view-tab active" data-view="monthly">월간</button>
        <button class="view-tab" data-view="weekly">주간</button>
        <button class="view-tab" data-view="daily">일간</button>
      </nav>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" id="btnAddTask">+ 새 일정</button>
    </div>
  </header>

  <div class="main-container">
    <!-- ==================== 사이드바 영역 ==================== -->
    <aside class="sidebar">
      <!-- 미니 캘린더 -->
      <div class="sidebar-section">
        <div class="mini-calendar">
          <div class="mini-calendar-header">
            <button class="btn-icon" id="miniPrev">◀</button>
            <span class="mini-calendar-title" id="miniCalendarTitle"></span>
            <button class="btn-icon" id="miniNext">▶</button>
          </div>
          <div class="mini-calendar-grid">
            <div class="mini-calendar-days">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="mini-calendar-dates" id="miniCalendarDates">
              <!-- JS에서 날짜 렌더링 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 우선순위 필터 -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">우선순위 필터</h3>
        <div class="filter-list">
          <label class="filter-item">
            <input type="checkbox" checked data-priority="high">
            <span class="filter-color filter-high"></span>
            높음
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-priority="medium">
            <span class="filter-color filter-medium"></span>
            중간
          </label>
          <label class="filter-item">
            <input type="checkbox" checked data-priority="low">
            <span class="filter-color filter-low"></span>
            낮음
          </label>
        </div>
      </div>

      <!-- 오늘의 일정 요약 -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">오늘의 일정</h3>
        <div class="today-summary" id="todaySummary">
          <p class="empty-message">등록된 일정이 없습니다.</p>
        </div>
      </div>
    </aside>

    <!-- ==================== 메인 캘린더 영역 ==================== -->
    <main class="content">
      <!-- 캘린더 네비게이션 -->
      <div class="calendar-nav">
        <button class="btn-icon" id="calendarPrev">◀</button>
        <h2 class="calendar-title" id="calendarTitle">2026년 4월</h2>
        <button class="btn-icon" id="calendarNext">▶</button>
        <button class="btn btn-secondary" id="btnToday">오늘</button>
      </div>

      <!-- 월간 뷰 -->
      <div class="calendar-view" id="monthlyView">
        <div class="calendar-weekdays">
          <div class="weekday sunday">일</div>
          <div class="weekday">월</div>
          <div class="weekday">화</div>
          <div class="weekday">수</div>
          <div class="weekday">목</div>
          <div class="weekday">금</div>
          <div class="weekday saturday">토</div>
        </div>
        <div class="calendar-grid" id="calendarGrid">
          <!-- JS에서 날짜 셀 렌더링 -->
        </div>
      </div>

      <!-- 주간 뷰 (초기에는 숨김) -->
      <div class="calendar-view hidden" id="weeklyView">
        <div class="weekly-grid" id="weeklyGrid">
          <!-- JS에서 주간 타임라인 렌더링 -->
        </div>
      </div>

      <!-- 일간 뷰 (초기에는 숨김) -->
      <div class="calendar-view hidden" id="dailyView">
        <div class="daily-grid" id="dailyGrid">
          <!-- JS에서 일간 타임라인 렌더링 -->
        </div>
      </div>
    </main>
  </div>

  <!-- ==================== 일정 등록/수정 모달 ==================== -->
  <div class="modal-overlay hidden" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">새 일정 등록</h3>
        <button class="btn-icon modal-close" id="modalClose">✕</button>
      </div>
      <form class="modal-body" id="taskForm">
        <div class="form-group">
          <label for="taskTitle">제목 <span class="required">*</span></label>
          <input type="text" id="taskTitle" placeholder="일정 제목을 입력하세요" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskDate">날짜 <span class="required">*</span></label>
            <input type="date" id="taskDate" required>
          </div>
          <div class="form-group">
            <label for="taskStartTime">시작 시간</label>
            <input type="time" id="taskStartTime">
          </div>
          <div class="form-group">
            <label for="taskEndTime">종료 시간</label>
            <input type="time" id="taskEndTime">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">우선순위</label>
            <select id="taskPriority">
              <option value="medium">중간</option>
              <option value="high">높음</option>
              <option value="low">낮음</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskReminder">알림</label>
            <select id="taskReminder">
              <option value="">없음</option>
              <option value="0">정시</option>
              <option value="10">10분 전</option>
              <option value="30">30분 전</option>
              <option value="60">1시간 전</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="taskMemo">메모</label>
          <textarea id="taskMemo" rows="3" placeholder="메모를 입력하세요"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger hidden" id="btnDelete">삭제</button>
          <div class="modal-footer-right">
            <button type="button" class="btn btn-secondary" id="btnCancel">취소</button>
            <button type="submit" class="btn btn-primary" id="btnSave">저장</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ==================== 삭제 확인 다이얼로그 ==================== -->
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 class="modal-title">일정 삭제</h3>
      </div>
      <div class="modal-body">
        <p>이 일정을 삭제하시겠습니까?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirmCancel">취소</button>
        <button class="btn btn-danger" id="confirmDelete">삭제</button>
      </div>
    </div>
  </div>

  <!-- ==================== 토스트 알림 ==================== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS 파일 (2단계에서 구현) -->
  <script src="js/store.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
